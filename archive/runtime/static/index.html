<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyxCode Runtime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a; color: #e0e0e0;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .lobster { font-size: 5rem; margin-bottom: 1rem; }
        .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 2rem; }
        .badge {
            display: inline-block; background: #1a1a2e; border: 1px solid #333;
            border-radius: 8px; padding: 0.5rem 1rem; margin: 0.25rem;
            font-family: monospace; font-size: 0.9rem;
        }
        .status { color: #4ade80; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .api-links { margin-top: 2rem; }
        .api-links a { display: block; margin: 0.5rem 0; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lobster">🦞</div>
        <h1>NyxCode Runtime</h1>
        <p class="subtitle">Self-contained HTTP + SQLite server</p>
        <div>
            <span class="badge status">● Running</span>
            <span class="badge">v0.1.0</span>
            <span class="badge">Rust + SQLite</span>
        </div>
        <div class="api-links">
            <p style="color: #888; margin-bottom: 0.5rem;">API Endpoints:</p>
            <a href="/api/health">GET /api/health</a>
            <a href="/api/users">GET /api/users</a>
            <a href="/api/posts">GET /api/posts</a>
        </div>
    </div>
</body>
</html>
